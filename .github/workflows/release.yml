name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with esbuild
        run: node build.mjs

      - name: Set version in package.json
        run: npm pkg set version=${{ github.event.inputs.version }}

      - name: Create release archive
        run: |
          zip -r finops-mcp-server-v${{ github.event.inputs.version }}.zip dist/ src/ tsconfig.json package.json README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: |
            ## finops-mcp-server v${{ github.event.inputs.version }}

            ### Installation
            Download the archive and run:
            ```
            node dist/index.js
            ```
          files: finops-mcp-server-v${{ github.event.inputs.version }}.zip
          draft: false
          prerelease: false
